                  guest_nationality: AE
                  hotel_star_level: any
                  supplier_uid: H1RL00028
                  partner_id: "1"
                  language: en
              twoRooms:
                value:
                  location: dubai
                  radius: auto
                  checkIn: 2025-05-15
                  checkOut: 2025-05-16
                  occupancies:
