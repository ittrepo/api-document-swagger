  /visa/validate-details:
   post:
    tags:
      - Visa Service
    summary: Validate visa selection before booking
    description: This API validates the visa availability, guest eligibility, and travel dates based on the selected SEO and option codes.
    operationId: validateVisaDetails
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object 
            required:
              - visa_seo_code
              - visa_option_code
              - guest_nationality
              - guest_visite
              - checkIn
              - total_adult
            properties:
              visa_seo_code:
                type: string
                example: "test-category-visa"
                description: "The unique SEO code for the visa category."
              visa_option_code:
                type: string
                example: "visit-visa"
                description: "Specific option/type code for the selected visa."
              guest_nationality:
                type: string
                example: "BD"
                description: "ISO code of the guest's nationality."
              guest_visite:
                type: string
                example: "IQ"
                description: "ISO code of the destination country (e.g., Iraq)."
              checkIn:
                type: string
                format: date
                example: "2026-03-10"
                description: "Expected travel/check-in date."
              total_adult:
                type: integer
                example: 2
                description: "Number of adult travelers."
              total_child:
                type: integer
                example: 0
                description: "Number of child travelers."
    responses:
      '200':
        description: Validation Successful
