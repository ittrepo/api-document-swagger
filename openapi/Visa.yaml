openapi: 3.0.3
info:
  title: ITT Visa API
  version: 1.0.0
  description: Visa API endpoints converted from Postman collection.

servers:
  - url: "{protocol}://{fullUrl}"
    description: Dynamic Server Selection
    variables:
      protocol:
        enum:
          - https
          - http
        default: https
      fullUrl:
        default: serviceapi.b2b.innovatedemo.com
        description: Full URL of the server, e.g., serviceapi.b2b.innovatedemo.com or localhost:8080

tags:
  - name: Visa
    description: Visa search, pricing, booking, ancillaries and post-booking flows.

security:
  - apiKeyAuth: []
    secretCodeAuth: []
paths:
  /visa/search:
   post:
    tags:
      - Visa Service
    summary: Search for available visa packages
    description: Get a list of available visas based on destination, category, and guest nationality.
    operationId: searchVisa
    requestBody:
      description: Visa search parameters
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - country_code
              - visa_category
              - guest_nationality
            properties:
              country_code:
                type: string
                example: "TH"
                description: "Destination country code (e.g., TH, AE, BD). Set null to search all."
              visa_category:
                type: string
                example: "business-visa"
                description: "Type of visa (e.g., tourist-visa, business-visa). Set null for all."
              guest_nationality:
                type: string
                example: "BD"
                description: "The nationality of the traveler (e.g., BD, IN)."
    responses:
      '200':
        description: Successfully fetched visa search results
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            examples:
              successful_visa_search:
                summary: Successful Visa Search Response
                value:
                  {
                      "status": "success",
                      "reason": "1 category visa service available",
                      "data": [
                          {
                              "visa_seo_code": "medical-visa",
                              "visa_title": "Medical Visa",
                              "primary_photo": "https://cdn.innovategrid.com/innovatesolution/visa/121772527373686170.png",
                              "country_name": "Bangladesh",
                              "country_code": "BD",
                              "visa_category": "business-visa",
                              "visa_category_title": "Business Visa",
                              "basic_info": "<p>none</p>\n\n<p>none</p>\n",
                              "last_update": "Tuesday, 2026-03-03 2:43 PM +06:00",
                              "starting_price": {
                                  "sale": {
                                      "amount": 9000,
                                      "currency": "BDT"
                                  },
                                  "purchase": {
                                      "amount": 9000,
                                      "currency": "BDT"
                                  },
                                  "fmg": {
                                      "amount": 9000,
                                      "currency": "BDT"
                                  },
                                  "supplier": {
                                      "amount": 9000,
                                      "currency": "BDT"
                                  }
                              }
                          }
                      ]
                  }

              no_visa_found:
                summary: No Visa Found for Criteria
                value:
                  status: "failed"
                  reason: "No visa packages found for the selected country and category!"

              invalid_nationality:
                summary: Invalid Nationality Error
                value:
                  status: "failed"
                  reason: "Visa services are currently unavailable for the provided guest nationality."

              authorization_failed:
                summary: Authorization Failed (Warning)
                value:
                  status: "failed"
                  is_warning: "yes"
                  reason: "You do not have authorization to access Visa services. Please reach out to the Support team."
                  reason_admin: "Visa Module is Disable"
  /visa/details:
   post:
    tags:
      - Visa Service
    summary: Get specific visa details by SEO code
    description: Fetch all information about a specific visa category and country using its unique SEO code.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - visa_seo_code
            properties:
              visa_seo_code:
