  /visa/create-order:
   post:
    tags:
      - Visa Service
    summary: Create a new visa application order
    description: Submit applicant details, passport information, and documents to create a visa booking for one or multiple travelers.
    operationId: createVisaOrder
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - member_id
              - tracking_id
              - payment_type
              - visa_applicant
            properties:
              member_id:
                type: string
                description: "The unique ID of the agency or member placing the order."
                example: "1"
              tracking_id:
                type: string
                description: "The unique tracking ID obtained from the 'validate-details' step."
                example: "1177468979868881A2U8M"
              payment_type:
                type: string
                enum: [account_balance, card]
                description: "Mode of payment. Choose 'account_balance' for instant deduction or 'card' for gateway payment."
                example: "account_balance"
              redirect_url:
                type: string
                description: "The URL where the user will be redirected after a successful card payment."
                example: "https://agent.sabbir.lan/booking_details/"
              visa_applicant:
                type: array
                description: "A list of one or more applicants applying for the visa."
                items:
                  type: object
                  required:
                    - visa_option_code
                    - pax_id
                    - first_name
                    - last_name
                    - doc_no
                    - attachment
                  properties:
                    visa_option_code:
                      type: string
                      description: "The specific option code for the visa (e.g., medical-visa, tourist-visa)."
                      example: "medical-visa"
                    pax_id:
                      type: string
                      description: "Unique identifier for the passenger within this order (e.g., 1, 2)."
                      example: "1"
                    gender:
                      type: string
                      description: "Gender of the applicant (M/F)."
                      example: "M"
                    title:
                      type: string
