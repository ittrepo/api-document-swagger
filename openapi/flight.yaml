  /flight/branded-fare:
   post:
    tags:
      - Flight
    summary: Get branded fare options for a flight
    operationId: flightBrandedFare

    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - member_id
              - tracking_id
              - flight_key
              - result_type
            properties:
              member_id:
                type: string
                example: "1"
              tracking_id:
                type: string
                example: "11174158960526193"
              flight_key:
                type: string
                example: "F1ZT00006-2"
              result_type:
                type: string
                example: "general"
              connected_flight_key:
                type: string
                nullable: true
                example: ""
              connected_brand_option:
                type: string
                nullable: true
                example: ""

    responses:
      '200':
        description: Branded fare options response
        content:
          application/json:
            schema:
              type: object
              properties:

                status:
                  type: string
                  example: "success"

                reason:
                  type: string
                  nullable: true
                  example: null

                member_id:
                  type: string

                tracking_id:
                  type: string

                result_type:
                  type: string

                total_options:
                  type: integer

                data:
                  type: array
                  items:
                    type: object
                    properties:
                      search_tracking_id:
                        type: string
                      tracking_id:
                        type: string
                      flight_key:
                        type: string
                      new_flight_key:
                        type: string
                      brand_option:
                        type: string
                      brand_title:
                        type: string
                        nullable: true
                      description:
                        type: string
                      order_by:
                        type: number
                        format: float

                      info:
                        type: array
                        items:
                          type: object
                          properties:
                            title:
                              type: string
                            code:
                              type: string
                            value:
                              type: string
                            remark:
                              type: string

                      price:
                        type: object
                        properties:
                          currency:
                            type: string
                          total:
                            type: number
                            format: float
                          gross_total:
                            type: number
                            format: float
                          base_fare:
                            type: number
                            format: float
                          tax:
                            type: number
                            format: float
                          price_hash:
                            type: string

                selected_flight:
                  type: object
                  properties:
                    tracking_id:
                      type: string
                    flight_key:
                      type: string
                    journey_type:
                      type: string
                    hold_possible:
                      type: string
                    supplier_title:
                      type: string
                    supplier_code:
                      type: string
                    total_price:
                      type: number
                      format: float

                    search_parameter:
                      type: object
                      properties:
                        journey_type:
                          type: string
                        travelers_adult:
                          type: integer
                        travelers_child:
                          type: integer
                        travelers_infants:
                          type: integer

                    fare_rules:
                      type: object
                      properties:
                        refundable:
                          type: string
                        change_before_departure:
                          type: string
                '400': { $ref: '#/components/responses/BadRequest' }
                '401': { $ref: '#/components/responses/Unauthorized' }
                '500': { $ref: '#/components/responses/ServerError' }
