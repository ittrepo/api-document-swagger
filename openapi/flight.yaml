                    type: string
                data:
                    type: array
                items:
                    type: object
                    properties:
                        tracking_id:
                            type: string
                        flight_key:
                             type: string
                        brand_option:
                            type: string    
            examples:
              default:
                value:
                  member_id: "1"
                  result_type: general
                  data:
                    - tracking_id: Value (Integer)
                      flight_key: String
                      brand_option: String
