openapi: 3.0.3
info:
  title: ITT Flight API
  version: 1.0.0
  description: Flight API endpoints converted from Postman collection.

servers:
  - url: "{protocol}://{fullUrl}"
    description: Dynamic Server Selection
    variables:
      protocol:
        enum:
          - https
          - http
        default: https
      fullUrl:
        default: serviceapi.b2b.innovatedemo.com
        description: Full URL of the server, e.g., serviceapi.b2b.innovatedemo.com or localhost:8080

tags:
  - name: Flight
    description: Flight search, pricing, booking, ancillaries and post-booking flows.

security:
  - apiKeyAuth: []
    secretCodeAuth: []
paths:
  
  /flight/search:
   post:
    tags:
      - Flight
    summary: Search flights OneWay 
    operationId: flightSearchoneWay
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
                journey_type:
                  type: string
                  enum:
                    [
                      OneWay,
                      RoundTrip
                      Multicity
                    ]
                Segment:
                  type: object
                  properties:
                      departure_airport_type: 
                        type: string
                        description: Type of departure location (AIRPORT / CITY / STATION)
                        example: AIRPORT
                      departure_airport: 
                        type: string
                        description: Departure airport IATA code
                        example: DAC
                      arrival_airport_type: 
                        type: string
                        description: Type of arrival location (AIRPORT / CITY / STATION)
                        example: AIRPORT
                      arrival_airport: 
                        type: string
                        description: Arrival airport IATA code
                        example: DXB
                      departure_date: 
                       type: string
                       format: date
                       description: Departure date in YYYY-MM-DD format
                       example: 2026-03-30
                Passenger Information:
                  type: object
                  properties:
                       travelers_adult:
                            type: integer
                            description: Number of adult passengers
                            example: 1
                       travelers_child:
                            type: integer
                            description: Number of child passengers
                            example: 1
                       travelers_infants:
                            type: integer
                            description: Number of infant passengers
                            example: 0
                       preferred_carrier:
                            type: string
                            description: Preferred airline carrier code (empty for any)
                            example: ""
                       non_stop_flight:
                            type: string
                            description: Filter for nonstop flights (yes / no / any)
                            example: any
                       baggage_option:
                            type: string
                            description: Baggage preference filter (any / with / without)
                            example: any
                       booking_class:
                            type: string
                            description: Cabin class for booking (Economy / Business / First)
                            example: Economy
                       supplier_uid:
                            type: string
                            description: Supplier identifier (all for any supplier)
                            example: all
                       partner_id:
                            type: integer
                            description: Partner account ID
                            example: 1
                       language:
                            type: string
                            description: Response language
                            example: en
                    
            additionalProperties: true
          examples:
            oneWay:
              summary: One Way Search
              value:
                journey_type: "OneWay"
                segment:
                  - departure_airport_type: "AIRPORT"
                    departure_airport: "DAC"
                    arrival_airport_type: "AIRPORT"
                    arrival_airport: "DXB"
                    departure_date: "2026-03-30"
                travelers_adult: 1
                travelers_child: 0
                travelers_infants: 0
                preferred_carrier: [""]
                non_stop_flight: "any"
                baggage_option: "any"
                booking_class: "Economy"
                supplier_uid: "all"
                partner_id: "1"
                language: "en"
            
    responses:
      '200':
        description: Flight search results
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            examples:
              default:
                summary: Successful Search Response
                value:
                  status: "success"
                  search_duration: "102 seconds"
                  timestamp: "1771393615"
                  search_complete: "2026-02-18 11:46:55"
                  tracking_id: "11177139351426194ETLIZ"
                  total_fight: 20
                  currency: "BDT"
                  resources:
                    base_url:
                      carrier: "https://airlines-resources.s3.ap-southeast-1.amazonaws.com/icon"
                      aircraft: "https://airlines-resources.s3.ap-southeast-1.amazonaws.com/aircraft"
                  data:
                    - flight_key: "F1TT00152-0"
                      journey_type: "OneWay"
                      price:
                        currency: "BDT"
                        total: 5295.3
                      flight_group:
                        - group: 1
                          no_of_stops: 0
                          flight_time: "PT1H"
                          routes:
                            - origin: "DAC"
                              destination: "CGP"
                              departure_time: "2026-03-12T10:00:00"
      '400': { $ref: '#/components/responses/BadRequest' }
      '401': { $ref: '#/components/responses/Unauthorized' }
      '404': { $ref: '#/components/responses/NotFound' }
      '500': { $ref: '#/components/responses/ServerError' }
  
  /flight/branded-fare:
   post:
    tags:
      - Flight
    summary: Get branded fare options for a flight
    operationId: flightBrandedFare

    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - member_id
              - tracking_id
              - flight_key
              - result_type
            properties:
              member_id:
                type: string
                example: "1"
              tracking_id:
                type: string
                example: "11174158960526193"
              flight_key:
                type: string
                example: "F1ZT00006-2"
              result_type:
                type: string
                example: "general"
              connected_flight_key:
                type: string
                nullable: true
                example: ""
              connected_brand_option:
                type: string
                nullable: true
                example: ""

    responses:
      '200':
        description: Branded fare options response
        content:
          application/json:
            schema:
              type: object
              properties:

                status:
                  type: string
                  example: "success"

                reason:
                  type: string
                  nullable: true
                  example: null

                member_id:
                  type: string

                tracking_id:
                  type: string

                result_type:
                  type: string

                total_options:
                  type: integer

                data:
                  type: array
                  items:
                    type: object
                    properties:
                      search_tracking_id:
                        type: string
                      tracking_id:
                        type: string
                      flight_key:
                        type: string
                      new_flight_key:
                        type: string
                      brand_option:
                        type: string
                      brand_title:
                        type: string
                        nullable: true
                      description:
                        type: string
                      order_by:
                        type: number
                        format: float

                      info:
                        type: array
                        items:
                          type: object
                          properties:
                            title:
                              type: string
                            code:
                              type: string
                            value:
                              type: string
                            remark:
                              type: string

                      price:
                        type: object
                        properties:
                          currency:
                            type: string
                          total:
                            type: number
                            format: float
                          gross_total:
                            type: number
                            format: float
                          base_fare:
                            type: number
                            format: float
                          tax:
                            type: number
                            format: float
                          price_hash:
                            type: string

                selected_flight:
                  type: object
                  properties:
                    tracking_id:
                      type: string
                    flight_key:
                      type: string
                    journey_type:
                      type: string
                    hold_possible:
                      type: string
                    supplier_title:
                      type: string
                    supplier_code:
                      type: string
                    total_price:
                      type: number
                      format: float

                    search_parameter:
                      type: object
                      properties:
                        journey_type:
                          type: string
                        travelers_adult:
                          type: integer
                        travelers_child:
                          type: integer
                        travelers_infants:
                          type: integer

                    fare_rules:
                      type: object
                      properties:
                        refundable:
                          type: string
                        change_before_departure:
                          type: string
      '400': { $ref: '#/components/responses/BadRequest' }
      '401': { $ref: '#/components/responses/Unauthorized' }
      '500': { $ref: '#/components/responses/ServerError' }
  /flight/validate:
