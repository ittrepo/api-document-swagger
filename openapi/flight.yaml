  /flight/issue-ticket:
    post:
      tags: [Flight]
      summary: Issue tickets for a validated booking
      operationId: flightIssueTicket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:

                member_id:
                   type: string
                   description: Logged in user member ID
                   example: "1"

                tracking_id:
                   type: string
                   description: Tracking ID received from Booking response
                   example: "186177260842803210UESNA"

                price_change_accepted:
                   type: string
                   description: Accept price change if fare updated (yes / no)
                   example: "no"

                notes:
                   type: string
                   description: Additional notes (optional)
                   example: "not required"
              additionalProperties: true
            example:
                {
                    "member_id": "1", 
                    "tracking_id": "11173813342526193WAN5G",
                    "price_change_accepted": "no",
                    "notes": "not required"
                }
