openapi: 3.0.3
info:
  title: ITT Flight API
  version: 1.0.0
  description: Flight API endpoints converted from Postman collection.
servers:
  - url: https://serviceapi.b2b.innovatedemo.com
tags:
  - name: Flight
    description: Flight search, pricing, booking, ancillaries and post-booking flows.
security:
  - apiKeyAuth: []
    secretCodeAuth: []
paths:
  /flight/package-option:
    post:
      tags: [Flight]
      summary: Find package options
      operationId: flightPackageOption
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            examples:
              default:
                value:
                  tracking_id: 11170962572705112
                  flight_key: F1FI00005-5
                  flight_option: "2"
                  connected_flight_key: F1FI00005-0
                  member_id: "1"
      responses:
        '200':
          description: Available package options for the selected flight
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/ServerError' }
  /flight/package-select:
    post:
      tags: [Flight]
      summary: Select a specific package for a flight
      operationId: flightPackageSelect
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            examples:
              default:
                value:
                  tracking_id: 11170962572705112
                  flight_key: F1FI00005-5
                  connected_flight_key: F1FI00005-0
                  flight_option: "2"
                  package_code: LITE
                  member_id: "1"
      responses:
        '200':
          description: Package selection confirmed with updated pricing
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/ServerError' }
  /flight/get-package-rate:
    post:
      tags: [Flight]
      summary: Get package rates for roundtrip flights
      operationId: flightGetPackageRate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            examples:
              default:
                value:
                  tracking_id: 11171006481102719
                  result_type: group
                  data:
                    - flight_key: F1FI00005-0
                      package_code: LITE
                    - flight_key: F1FI00005-1
                      package_code: LITE
      responses:
        '200':
          description: Package rate details for requested segments
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/ServerError' }
  /flight/update-pax-passport:
    post:
      tags: [Flight]
      summary: Update passenger passport and contact information
      operationId: flightUpdatePaxPassport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            examples:
              default:
                value:
                  tracking_id: 11170298498424273
                  member_id: "1"
                  action_type: all
                  passenger:
                    - pax_id: "1"
                      pax_type: ADT
                      title: Mr
                      first_name: Nazmus
                      last_name: Nayeem
                      gender: M
                      dob: 1985-10-24
                      pax_age: "38"
                      doc_country: BD
                      doc_no: A4545455
                      doc_dateofexpiry: 2030-12-25
                      isd_code: "1"
                      contact_no: "8722956059"
                      email_address: iam@saaqeb.com
      responses:
        '200':
          description: Passenger information updated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/ServerError' }
  /flight/update-booking-info:
    post:
      tags: [Flight]
      summary: Update booking-level information
      operationId: flightUpdateBookingInfo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            examples:
              default:
                value:
                  tracking_id: 131707836014242733
                  member_id: "1"
                  supplier_uid: F1DT00001
                  supplier_confirmation_id: ord_0000AeqJtGxkm1FwcohJJI
                  airlines_pnr: 3OTGI6
                  booking_status: confirm
                  ticket_status: issued
                  carrier_hotel: AI
                  departure_airport: DAC
                  arrival_airport: BKK
                  journey_type: OneWay
                  auto_cancel_status: auto-cancel
                  auto_cancel: 2024-02-13 23:59:59
                  booking_remarks: Sample
                  passenger:
                    - pax_id: "1"
                      ticket_number: X121211221
      responses:
        '200':
          description: Booking metadata updated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/ServerError' }
  /flight/get-pax-details:
    post:
      tags: [Flight]
      summary: Get single passenger details
      operationId: flightGetPaxDetails
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            examples:
              default:
                value:
                  member_id: "1"
                  tracking_id: 11170298498424273
                  pax_id: "1"
                  pax_type: ADT
      responses:
        '200':
          description: Passenger details
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }
  /flight/search:
   post:
    tags:
      - Flight
    summary: Search flights (OneWay, RoundTrip, MultiCity)
    operationId: flightSearch
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
          examples:
            oneWay:
              summary: One Way Search
              value:
                journey_type: "OneWay"
                segment:
                  - departure_airport_type: "AIRPORT"
                    departure_airport: "KHI"
                    arrival_airport_type: "AIRPORT"
                    arrival_airport: "LHE"
                    departure_date: "2025-03-30"
                travelers_adult: 1
                travelers_child: 0
                travelers_infants: 0
                preferred_carrier: [""]
                non_stop_flight: "any"
                baggage_option: "any"
                booking_class: "Economy"
                supplier_uid: "F1ZT00006"
                partner_id: "1"
                language: "en"
            roundTrip:
              summary: Round Trip Search
              value:
                journey_type: "RoundTrip"
                segment:
                  - departure_airport_type: "AIRPORT"
                    departure_airport: "DAC"
                    arrival_airport_type: "AIRPORT"
                    arrival_airport: "DXB"
                    departure_date: "2025-10-25"
                    arrival_date: "2025-10-30"
                  - departure_airport_type: "AIRPORT"
                    departure_airport: "DXB"
                    arrival_airport_type: "AIRPORT"
                    arrival_airport: "DAC"
                    departure_date: "2025-11-26"
                    arrival_date: "2025-11-30"
                travelers_adult: 1
                travelers_child: 0
                travelers_infants: 0
                supplier_uid: "F1EC00009"
                partner_id: "1"
                language: "en"
    responses:
      '200':
        description: Flight search results
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            examples:
              default:
                summary: Successful Search Response
                value:
                  status: "success"
                  search_duration: "102 seconds"
                  timestamp: "1771393615"
                  search_complete: "2026-02-18 11:46:55"
                  tracking_id: "11177139351426194ETLIZ"
                  total_fight: 20
                  currency: "BDT"
                  resources:
                    base_url:
                      carrier: "https://airlines-resources.s3.ap-southeast-1.amazonaws.com/icon"
                      aircraft: "https://airlines-resources.s3.ap-southeast-1.amazonaws.com/aircraft"
                  data:
                    - flight_key: "F1TT00152-0"
                      journey_type: "OneWay"
                      price:
                        currency: "BDT"
                        total: 5295.3
                      flight_group:
                        - group: 1
                          no_of_stops: 0
                          flight_time: "PT1H"
                          routes:
                            - origin: "DAC"
                              destination: "CGP"
                              departure_time: "2026-03-12T10:00:00"
                      '400': { $ref: '#/components/responses/BadRequest' }
                      '401': { $ref: '#/components/responses/Unauthorized' }
                      '404': { $ref: '#/components/responses/NotFound' }
                      '500': { $ref: '#/components/responses/ServerError' }
      
