  /flight/update-travellers:
    post:
      tags: [Flight]
      summary: Update passenger details in a booking
      operationId: flightUpdateTravellers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                 booking_tracking_id:
                    type: string
                    description: Booking tracking ID from previous step
                    example: "6911771481303261946AGZX"
                 member_id:
                    type: string
                    description: Member account ID
                    example: "1"
                 save_pax:
                    type: string
                    description: Save passenger information for future booking
                    example: "yes"
                 passenger:
                    type: array
                    description: Passenger list
                    items:
                        type: object
                        required:
                        - pax_id
                        - pax_type
                        - gender
                        - title
                        - first_name
                        - last_name
                        - dob
                        properties:
                            pax_id:
                                type: string
                                description: Passenger unique ID
                                example: "1"
                            pax_type:
                                type: string
                                description: Passenger type (ADT = Adult, CNN = Child, INF = Infant)
                                example: ADT
                            gender:
                                type: string
                                description: Passenger gender
                                example: M
                            title:
                                type: string
                                description: Title (Mr, Mrs, Ms, Miss, Mstr)
                                example: MR
                            first_name:
                                type: string
                                example: Imam
                            last_name:
                                type: string
                                example: Hasan
                            dob:
                                type: string
                                format: date
                                description: Date of birth (YYYY-MM-DD)
                                example: "1998-10-24"
                            doc_country:
                                type: string
                                description: Passport issuing country
                                example: BD
                            doc_no:
                                type: string
                                description: Passport number
                                example: A1235121
                            doc_dateofexpiry:
                                type: string
                                format: date
                                description: Passport expiry date
                                example: "2028-10-25"
                            doc_dateofissue:
                                type: string
                                format: date
                                description: Passport issue date
                                example: "2023-10-25"
                            frequent_flyer:
                                type: string
                                description: Frequent flyer number
                                example: "21321313132"
                            isd_code:
                                type: string
                                description: Country ISD code
                                example: "880"
                            contact_no:
                                type: string
                                description: Passenger contact number
                                example: "0175565521"
                            email_address:
                                type: string
                                format: email
                                description: Passenger email
                                example: "iam@jhon.com"
                            wheelchair_required:
                                type: string
                                description: Wheelchair assistance required (yes/no)
                                example: "no"



              additionalProperties: true
