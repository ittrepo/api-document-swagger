  /flight/update-baggage:
    post:
      tags: [Flight]
      summary: Add or update baggage selections
      operationId: flightUpdateBaggage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:

                 booking_tracking_id:
                    type: string
                    description: Booking tracking ID from booking step
                    example: "71176110719926193FHWN5"

                 member_id:
                    type: string
                    description: Member account ID
                    example: "1"

                 pax_type:
                    type: string
                    description: Passenger type (ADT = Adult, CNN = Child, INF = Infant)
                    example: "ADT"

                 pax_id:
                    type: string
                    description: Passenger ID
                    example: "1"
                 data:
                    type: array
                    description: Selected baggage options
                    items:
                     type: object
                     required:
                      - select_code
                      - baggage_quantity
                     properties:
                        select_code:
                            type: string
                            description: Baggage option code
                            example: "3"
                        baggage_quantity:
                            type: string
                            description: Number of baggage selected
                            example: "1"

              additionalProperties: true
            example:
                    {
                        "booking_tracking_id": "71176110719926193FHWN5",
                        "member_id": "1",
                        "pax_type": "ADT",
                        "pax_id": "1",
                        "data": [
                            {
                                "select_code": "3",
                                "baggage_quantity": "1"
                            }
                        ]
