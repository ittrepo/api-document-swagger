  /train/create-booking:
   post:
    tags:
      - Train Service
    summary: Create a train booking
    description: Finalizes the booking process by processing payment through the selected payment method.
    operationId: createTrainBooking
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - tracking_id
              - payment_type
              - redirect_url
            properties:
              tracking_id:
                type: string
                description: "The unique tracking ID for the booking."
                example: "311177572884426194QMRVJ"
              member_id:
                type: string
                description: "ID of the logged-in member."
                example: "1"
              isd_code:
                type: string
                example: "880"
              contact_no:
                type: string
                example: "1966330000"
              email_address:
                type: string
                format: email
                example: "sabbir@innovatesolution.com"
              payment_type:
                type: string
                enum: [account_balance, card, onlinepayment]
                description: "Method of payment for the booking."
                example: "account_balance"
              redirect_url:
                type: string
                format: uri
                description: "URL to redirect after payment processing."
                example: "https://agent.sabbir.lan/booking-details/train"
    responses:
        '200':
          description: Booking created successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              examples:
                 successful_booking_creation:
                  summary: Successful Booking Creation Response
                  value:
                    {
                        "status": "success",
                        "reason": "Booking has been successfully created.",
                        "tracking_id": "311177572884426194QMRVJ",
                        "booking_id": "ES2510NOKJAAFK",
                        "payment_status": "pending",
                        "redirect_url": "https://agent.sabbir.lan/booking-details/train"
                    }
                                      
  /train/booking-details:
    post:
      tags: [Train Service]
      summary: Get booking details
      operationId: bookingDetails
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - member_id
                - tracking_id
                - booking_id
              properties:

                member_id:
                  type: string
                  description: Logged-in user member ID
                  example: "2"

                tracking_id:
                  type: string
                  description: eSIM or booking tracking ID
                  example: "11177260822126194QDWJV"

                booking_id:
                  type: string
                  description: Booking ID for the eSIM package
                  example: "ES2604MAYVA3A8"
              additionalProperties: true
            examples:
              default:
                value:
                  member_id: "2"
                  tracking_id: 11176276126126194RHSGI
                  booking_id: ES2510NOKJAAFK
      responses:
        '200':
          description: Booking info
          content:
            application/json:
              schema:
                type: object
