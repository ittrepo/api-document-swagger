  /train/validate:
   post:
    tags:
      - Train Service
    summary: Validate train selection and fare
    description: Validates the selected train, fare class, and passenger nationality before proceeding to booking. Supports both One-Way and Round-Trip validation.
    operationId: validateTrain
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - tracking_id
              - guest_nationality
              - outbound_train_id
              - outbound_fare_class
            properties:
              tracking_id:
                type: string
                description: "The unique tracking ID returned from the search results."
                example: "3117757287332YW1"
              guest_nationality:
                type: string
                description: "ISO country code of the passenger."
                example: "BD"
              outbound_train_id:
                type: string
                description: "The unique identifier for the outbound train."
                example: "MKX_JXD_0080_2026-04-19T08:00:00"
              outbound_fare_class:
                type: string
                description: "The class of service for the outbound journey (e.g., Y for Economy, B for Business)."
                example: "Y"
              return_train_id:
                type: string
                description: "The unique identifier for the return train (Required for RoundTrip)."
                example: "JED_JXD_5061_2025-08-18T06:35:00"
              return_fare_class:
                type: string
                description: "The class of service for the return journey (Required for RoundTrip)."
                example: "Y"
