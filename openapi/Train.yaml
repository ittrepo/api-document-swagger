  /train/single-train:
   post:
    tags:
        - Train Service
    summary: Get details for a specific train
    description: Returns availability and pricing for a single train using the tracking ID and train ID obtained from the search results.
    operationId: getSingleTrain
    requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tracking_id
                - train_id
              properties:
                tracking_id:
                  type: string
                  description: "The unique tracking ID returned from the /train/search response."
                  example: "11774948590VTY1"
                train_id:
                  type: string
                  description: "The unique identifier for the specific train."
                  example: "JXD_DMX_0080_2026-04-05T08:32:00"
    responses:
