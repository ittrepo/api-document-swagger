  /activity/cancel-booking:
   post:
    tags:
      - Activity Service
    summary: Cancel an existing activity booking
    description: This endpoint allows users to cancel a booked activity using the tracking ID and providing a specific reason.
    operationId: cancelActivityBooking
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - member_id
              - tracking_id
              - reason
            properties:
              member_id:
                type: string
                description: "The unique ID of the member who made the booking."
                example: "1"
              tracking_id:
                type: string
                description: "The unique tracking ID or booking reference ID of the activity."
                example: "11176171377026194RX2KZ"
              reason:
                type: string
                description: "Brief explanation for the cancellation."
                example: "not required"
    responses:
      '200':
        description: Cancellation request processed successfully
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            examples:
              cancel_success:
                summary: Successful Cancellation
                value:
                  status: "success"
                  message: "Your cancellation request has been processed successfully."
                  refund_amount: 12000.00
                  currency: "BDT"
                  cancellation_charge: 500.00
                  tracking_id: "11176171377026194RX2KZ"

              non_cancellable:
                summary: Non-refundable Booking Error
                value:
                  status: "failed"
                  reason: "This activity is non-refundable and cannot be cancelled."
                  tracking_id: "11176171377026194RX2KZ"

              authorization_failed:
                summary: Authorization Error
                value:
                  status: "failed"
                  is_warning: "yes"
                  reason: "You do not have permission to cancel this booking."
                  reason_admin: "Member ID mismatch with booking record"
