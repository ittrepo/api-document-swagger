  /activity/search-single:
   post:
    tags:
      - Activity Service
    summary: Search for a single specific activity details
    description: Retrieve detailed availability and pricing for a specific activity using its unique activity ID.
    operationId: searchSingleActivity
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - activity_id
              - travelers_adult
              - from
              - to
              - language
              - guest_nationality
            properties:
              activity_id:
                type: string
                description: "The unique identifier for the activity (includes supplier and hash data)."
                example: "X1TY00043#T66-1205-22924#614b68c0-d862-422f-a6ca-7dd3ad15c84d"
              travelers_adult:
                type: integer
                description: "Total number of adult travelers."
                example: 3
              travelers_child:
                type: integer
                description: "Total number of child travelers."
                example: 1
              travelers_infants:
                type: integer
                description: "Total number of infant travelers."
                example: 0
              travelers_child_age:
                type: array
                items:
                  type: integer
                description: "Ages of child travelers in an array."
                example: [5]
              travelers_infants_age:
                type: array
                items:
                  type: integer
                description: "Ages of infant travelers in an array."
                example: []
              from:
                type: string
                format: date
                description: "Start date of the activity (YYYY-MM-DD)."
                example: "2026-02-28"
              to:
                type: string
                format: date
                description: "End date of the activity (YYYY-MM-DD)."
                example: "2026-03-01"
              order:
                type: string
                enum: [DEFAULT, PRICE, NAME]
                description: "Sorting preference for the response."
                example: "DEFAULT"
              language:
                type: string
                description: "Response language code (e.g., en, fr)."
                example: "en"
              guest_nationality:
                type: string
                description: "ISO 2-letter country code of the guest's nationality."
                example: "BD"
    responses:
      '200':
        description: Specific activity data retrieved successfully
