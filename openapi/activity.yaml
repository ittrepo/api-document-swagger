  /activity/update-traveler:
   post:
    tags:
      - Activity Service
    summary: Update traveler information for an activity booking
    description: This endpoint allows updating the details of passengers (travelers) associated with a specific activity tracking ID before final confirmation.
    operationId: updateActivityTraveler
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - tracking_id
              - member_id
              - passenger
            properties:
              tracking_id:
                type: string
                description: "The booking tracking ID received from the Validation step."
                example: "311177598415126194HNY4Y"
