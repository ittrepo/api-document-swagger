                              "description": "Discover the Majorcan Northern West Coast, its mountains, cliffs, and coastal treasures. A 9-hour panoramic tour combining stretches by bus, train, tram, and boat. Land and sea to enjoy some of the most emblematic landscapes of the island.<br />\n<br />\nStarting from the north, east, or south of Mallorca, the bus will take you to Palma to take the train to Sóller. Then you will go on board the vintage Train of Sóller, its wooden wagons, pampered with care and its rattle will return you to 1912, the year that was created this railway line, a fantastic trip through the Valley of Sóller between olive and orange trees, passing the natural barriers of the Alfábia Mountains, through 13 tunnels, several bridges, and a famous viaduct, to reach the city of Palma and end our tour.<br />\n<br />\nDepending on the schedule you will have free time to have lunch in Sóller or La Calobra, you will take a local tram that will bring you to Soller Harbor allowing you to admire the coast of this marvelous town.<br />\n<br />\nAfterward, you will enjoy a nice boat tour to admire from the sea one of the best Majorcan coastal landscapes, with wonderful views of the port and its cliffs mottled with elegant houses and famous villas surrounded by pine and olive trees reaching La Calobra, with free time to visit Torrent de Pareis.<br />\n<br />\nAfter admiring this natural wonder, the bus will bring you back to your original departure point.<br />\n<br />\n<strong>Options</strong><br />\n<strong>- Pick-up from the North and the East Areas: </strong>Cala Mesquida,Cala Ratjada,Font de Sa Cala,Canyamel,Cala Bona,Cala Millor, Sa Coma and S'Illot, Porto Cristo,Cala Mandia,Punta Reina, Calas de Mallorca, Porto Colom,Cala Ferrera, Cala D'Or, Cala Egos, Porto Petro, Cala Barca, Cala Figuera, Cala Santanyi,Colonia de Sant Jordi, Cala San Vicente,Puerto Pollensa,Puerto Alcudia,Can Picafort.<br />\n- <strong>Pick-up from the South Area:</strong> From Arenal