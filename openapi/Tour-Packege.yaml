openapi: 3.0.3
info:
  title: ITT Visa API
  version: 1.0.0
  description: Visa API endpoints converted from Postman collection.

servers:
  - url: "{protocol}://{fullUrl}"
    description: Dynamic Server Selection
    variables:
      protocol:
        enum:
          - https
          - http
        default: https
      fullUrl:
        default: serviceapi.b2b.innovatedemo.com
        description: Full URL of the server, e.g., serviceapi.b2b.innovatedemo.com or localhost:8080

tags:
  - name: Tour Service
    description: Tour search, pricing, booking, ancillaries and post-booking flows.

security:
  - apiKeyAuth: []
    secretCodeAuth: []
paths:
  /service-tour/city-suggestion:
   post:
    tags:
      - Tour Service
    summary: Get city suggestions for tours
    description: Retrieves a list of cities based on the country code. If the country_code is left empty (null/empty string), it returns suggestions for all available countries.
    operationId: getCitySuggestions
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              country_code:
                type: string
                description: "ISO country code (e.g., 'TH', 'AE'). Set as an empty string to get suggestions for all countries."
                example: ""
    responses:
      '200':
        description: Successful Retrieval of City Suggestions
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            examples:
              all_countries:
