                            "tour_visa_info": "<p>Please click on the given link for Dubai Visa details:<a href=\"http://akijair.com/visa?country_code=AE&amp;visa_category=all\"><u>http://a</u></a>gent.innovatesolution.com</p>\n",
                            "tour_additional_info": "<p>To book a tour, a reservation request must be submitted through the Inno Travel Tech website or directly via contact.</p>\n\n<ul>\n\t<li>Contact:<a href=\"tel:09613500850\"> 09613500850</a> or<a href=\"tel: 01332500868\"> 01332500868</a></li>\n\t<li>Email: <a href=\"mailto:tourism.support@akijair.com\">support@innovatesolution.com</a></li>\n\t<li>Website:<a href=\"http://akijair.com\">http://agent.innovatesolution.com</a><br />\n\t&nbsp;</li>\n</ul>\n\n<p><strong>Financial Details</strong></p>\n\n<ul>\n\t<li>Adults on double &nbsp;share Basis TK. 100,000BDT(as of now)</li>\n\t<li>Children (05-11 yrs) 25% less.</li>\n\t<li>Children (02-05 yrs) 50% less.</li>\n\t<li>Infant (0- below 02) free.</li>\n</ul>\n\n<p>Your con&iuml;&not;rmation of the Holiday will ensure that you have read the Cancellation Policy thoroughly and accepted it</p>\n\n<ul>\n\t<li>15 days prior to the travel date - 50 % of total holiday cost.</li>\n\t<li>10 days prior to the travel date - 75 % of total holiday cost.</li>\n\t<li>05 days prior to the travel date - 100% of holiday cost.</li>\n</ul>\n",
