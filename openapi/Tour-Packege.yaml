  /service-tour/search:
   post:
    tags:
      - Tour Service
    summary: Search for available tours
    description: Search for tours based on country, city, category, or specific tour name. Leave fields empty (null string) to broaden the search results.
    operationId: searchTours
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - tour_date
            properties:
              country_code:
                type: string
                description: "ISO country code (e.g., TH, AE). Set empty for all countries."
                example: ""
              city_code:
                type: string
                description: "City name or code (e.g., Dubai, Dhaka). Set empty for all cities."
                example: ""
              tour_category_code:
                type: string
                description: "Category of the tour (e.g., luxury, family). Set empty for all categories."
                example: ""
              tour_name:
                type: string
                description: "Specific name of the tour or service. Set empty for all."
                example: ""
              tour_date:
                type: string
                format: date
                description: "The date of the tour (YYYY-MM-DD)."
                example: "2026-06-20"
    responses:
