openapi: 3.0.3
info:
  title: ITT Visa API
  version: 1.0.0
  description: Visa API endpoints converted from Postman collection.

servers:
  - url: "{protocol}://{fullUrl}"
    description: Dynamic Server Selection
    variables:
      protocol:
        enum:
          - https
          - http
        default: https
      fullUrl:
        default: serviceapi.b2b.innovatedemo.com
        description: Full URL of the server, e.g., serviceapi.b2b.innovatedemo.com or localhost:8080

tags:
  - name: Visa
    description: Visa search, pricing, booking, ancillaries and post-booking flows.

security:
  - apiKeyAuth: []
    secretCodeAuth: []
paths:
  /service-tour/city-suggestion:
   post:
    tags:
      - Tour Service
    summary: Get city suggestions for tours
    description: Retrieves a list of cities based on the country code. If the country_code is left empty (null/empty string), it returns suggestions for all available countries.
    operationId: getCitySuggestions
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              country_code:
                type: string
                description: "ISO country code (e.g., 'TH', 'AE'). Set as an empty string to get suggestions for all countries."
                example: ""
    responses:
      '200':
        description: Successful Retrieval of City Suggestions
        content:
          application/json:
            examples:
              invalid_country:
                summary: Invalid Country Code
                value:
                  status: "failed"
                  reason: "The provided country code is invalid or not supported."
              
              no_cities_found:
                summary: No Data Found
                value:
                  status: "failed"
                  reason: "No cities found for the selected country."
      
             
  /esim/booking-details:
    post:
      tags: [Tour Package]
      summary: Get booking details
      operationId: bookingDetails
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - member_id
                - tracking_id
                - booking_id
              properties:

                member_id:
                  type: string
                  description: Logged-in user member ID
                  example: "2"

                tracking_id:
                  type: string
                  description: eSIM or booking tracking ID
                  example: "11177260822126194QDWJV"

                booking_id:
                  type: string
                  description: Booking ID for the eSIM package
                  example: "ES2604MAYVA3A8"
              additionalProperties: true
            examples:
              default:
                value:
                  member_id: "2"
                  tracking_id: 11176276126126194RHSGI
                  booking_id: ES2510NOKJAAFK
      responses:
        '200':
          description: Booking info
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        
        



components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: apikey
    secretCodeAuth:
      type: apiKey
      in: header
      name: secretecode
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    ServerError:
      description: Server error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string