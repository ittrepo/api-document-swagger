                            "policy_info": "<ul>\n\t<li>Tour package confirmation always depends on availability at the time of booking</li>\n\t<li>Package itinerary can be changed which will be informed to travelers before travel</li>\n\t<li>All tours and sightseeing are based on SIC</li>\n\t<li>No refund in case of unused services or lesser duration of stay</li>\n\t<li>Children (2-11) must share a room with two adults and will not be considered for extra bed requests, and will occupy a seat on the coach</li>\n\t<li>Child prices only apply if there are 2 adults. In the case of 1 adult and 1 child you will need to book for 2 adults</li>\n\t<li>Not wheelchair accessible</li>\n\t<li>We only provide consultancy service, and don&#39;t provide any guarantee for visas</li>\n\t<li>File processing for visa will start only after receiving all necessary documents</li>\n\t<li>Visa Processing time, requirements and fees are subject to change by the Embassy without any prior notice</li>\n</ul>\n",
                            "payment_terms_info": "<p><strong>Phase-1:</strong> 80% of the total package amount at the time of booking.&nbsp;</p>\n\n<p><strong>Phase-2:</strong> 20% of the total package amount before seven days of travel date.</p>\n\n<p><strong>Phase-3:</strong> Payments can be made via bank transfer, credit card, or other accepted methods.</p>\n\n<p><strong>&nbsp;&nbsp;&nbsp;&nbsp;Bank Details</strong></p>\n\n<table cellspacing=\"0\">\n\t<tbody>\n\t\t<tr>\n\t\t\t<td>\n\t\t\t<p><strong>Bank Name&nbsp;</strong></p>\n\t\t\t</td>\n\t\t\t<td>\n\t\t\t<p><strong>Account Title&nbsp;</strong></p>\n\t\t\t</td>\n\t\t\t<td>\n\t\t\t<p><strong>Account Number&nbsp;</strong></p>\n\t\t\t</td>\n\t\t\t<td>\n\t\t\t<p><strong>Branch Name&nbsp;</strong></p>\n\t\t\t</td>\n\t\t\t<td>\n\t\t\t<p><strong>Routing Number</strong></p>\n\t\t\t</td>\n\t\t</tr>\n\t\t<tr>\n\t\t\t<td>\n\t\t\t<p><strong>Islami Bank Bangladesh PLC</strong></p>\n\t\t\t</td>\n\t\t\t<td>\n\t\t\t<p><strong>Inno Travel Tech</strong></p>\n\t\t\t</td>\n\t\t\t<td>\n\t\t\t<p><strong>876543654365454&nbsp;</strong></p>\n\t\t\t</td>\n\t\t\t<td>\n\t\t\t<p><strong>Head Office</strong></p>\n\t\t\t</td>\n\t\t\t<td>\n\t\t\t<p><strong>76543345667</strong></p>\n\t\t\t</td>\n\t\t</tr>\n\t\t<tr>\n\t\t\t<td>\n\t\t\t<p><strong>Dutch bangla Bank PLC&nbsp;</strong></p>\n\t\t\t</td>\n\t\t\t<td>\n\t\t\t<p><strong>Inno Travel Tech</strong></p>\n\t\t\t</td>\n\t\t\t<td>\n\t\t\t<p><strong>34567876546543&nbsp;</strong></p>\n\t\t\t</td>\n\t\t\t<td>\n\t\t\t<p><strong>Gulshan-1</strong></p>\n\t\t\t</td>\n\t\t\t<td>\n\t\t\t<p><strong>44345544343</strong></p>\n\t\t\t</td>\n\t\t</tr>\n\t\t<tr>\n\t\t\t<td>\n\t\t\t<p><strong>Brac Bank&nbsp;</strong></p>\n\t\t\t</td>\n\t\t\t<td>\n\t\t\t<p><strong>Inno Travel Tech</strong></p>\n\t\t\t</td>\n\t\t\t<td>\n\t\t\t<p><strong>87654654354343&nbsp;</strong></p>\n\t\t\t</td>\n\t\t\t<td>\n\t\t\t<p><strong>Avenue</strong></p>\n\t\t\t</td>\n\t\t\t<td>\n\t\t\t<p><strong>2345654345</strong></p>\n\t\t\t</td>