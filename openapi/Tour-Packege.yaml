  /service-tour/update-traveller:
   post:
    tags:
      - Tour Service
    summary: Update traveller information for tour
    description: Updates the passenger details for a tour booking using the tracking ID.
    operationId: updateTourTraveller
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - tracking_id
              - passenger
            properties:
              tracking_id:
                type: string
                description: "The unique tracking ID from the validation step."
                example: "31177718803526194Z77UX"
              member_id:
                type: string
                description: "ID of the logged-in member."
                example: "1"
              save_pax:
                type: string
                enum: [yes, no]
                description: "Whether to save the passenger data for future use."
                example: "no"
              passenger:
                type: array
                items:
                  type: object
                  required:
                    - pax_id
                    - first_name
                    - last_name
                  properties:
                    pax_id:
                      type: string
                      example: "1"
                    pax_type:
                      type: string
                      description: "ADT, CHN, or INF"
                      example: "ADT"
                    gender:
                      type: string
                      example: "M"
                    title:
                      type: string
                      example: "Mr"
                    first_name:
                      type: string
                      example: "Mahade Hasan"
                    last_name:
                      type: string
                      example: "Ali"
                    dob:
                      type: string
                      format: date
                      example: "1993-10-24"
                    isd_code:
                      type: string
                      example: "880"
                    contact_no:
                      type: string
                      example: "1966330000"
                    email_address:
                      type: string
                      format: email
                      example: "test@test.com"
    responses:
       '200':
        description: Traveller Update Error
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            examples:
              Successful_update_Traveller:
                summary: Successful Update Traveller.
                value:
                        {
                            "status": "success",
                            "reason": "Passenger data has been successfully updated.",
                            "tracking_id": "31177718803526194Z77UX",
                            "total_guest": 2,
                            "data": [
                                {
                                    "tracking_id": "31177718803526194Z77UX",
                                    "pax_id": "1",
                                    "pax_type": "ADT",
                                    "gender": "M",
                                    "title": "MR",
                                    "first_name": "MAHADE HASAN",
                                    "last_name": "ALI",
                                    "pax_age": "32",
                                    "isd_code": "880",
                                    "contact_no": "1966330000",
                                    "email_address": "test@test.com"
                                },
                                {
                                    "tracking_id": "31177718803526194Z77UX",
                                    "pax_id": "2",
                                    "pax_type": "ADT",
                                    "gender": "M",
                                    "title": "MR",
                                    "first_name": "SHOWKAT",
                                    "last_name": "ALI",
                                    "pax_age": "32",
                                    "isd_code": "880",
                                    "contact_no": "1966330000",
                                    "email_address": "test@test.com"
                                }
                            ]
                        }

              pax_count_mismatch:
                summary: Passenger Count Mismatch
                value:
                  status: "failed"
                  reason: "The number of passengers submitted does not match the validated search criteria (2 Adults required)."
              
              invalid_dob:
                summary: Invalid Date of Birth
                value:
                  status: "failed"
                  reason: "Passenger Date of Birth (DOB) is not valid for the selected pax_type (ADT)."

              validation_expired:
                summary: Session Expired
                value:
                  status: "failed"
                  reason: "The tracking ID has expired. Please validate the tour again."
  /service-tour/order:
   post:
    tags:
      - Tour Service
    summary: Confirm tour booking and place order
    description: Finalizes the tour booking process. If the payment_type is 'card', the redirect_url is used for payment processing.
    operationId: createTourOrder
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - tracking_id
              - payment_type
              - redirect_url
            properties:
              tracking_id:
                type: string
                description: "The unique tracking ID for the booking."
                example: "1176243236526194WVF8W"
              member_id:
                type: string
                description: "ID of the logged-in member."
                example: "1"
              isd_code:
                type: string
                example: "880"
              contact_no:
                type: string
                example: "1966330000"
              email_address:
                type: string
                format: email
                example: "sabbir@innovatesolution.com"
              payment_type:
                type: string
                enum: [account_balance, card]
                description: "Payment method (account_balance or card)."
                example: "account_balance"
              redirect_url:
                type: string
                format: uri
                description: "Required if payment_type is 'card'."
                example: "https://ittsabbir.innotraveltech.com/booking-details/tour"
              special_requests_notes:
                type: string
                example: "n/a"
              agency_isd_code:
                type: string
                example: "880"
              agency_contact_no:
                type: string
                example: "1966330000"
              agency_email:
                type: string
                format: email
                example: "sabbir@innovatesolution.com"
    responses:
       '200':
        description: Booking Confirmation
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            examples:
              successful_booking:
                summary: Successful Booking Confirmation
                value:
                  status: "success"
                  reason: "Your tour booking has been successfully confirmed."
                  tracking_id: "1176243236526194WVF8W"
                  order_id: "ORD123456789"
                  payment_status: "paid"
                  
            




              insufficient_balance:
                summary: Insufficient Account Balance
                value:
                  status: "failed"
                  available_balance: "500.00"
                  required_balance: "25000.00"
                  reason: "Your account balance is insufficient to complete this tour booking."

              payment_failed:
                summary: Payment Processing Failed
                value:
                  status: "failed"
                  reason: "The payment could not be processed. Please try again or use a different method."

              order_expired:
                summary: Booking Session Expired
                value:
                  status: "failed"
                  reason: "The tracking ID has expired or the tour package is no longer available."
                  tracking_id: "1176243236526194WVF8W"


             
  /esim/booking-details:
    post:
      tags: 
        - Tour Service
      summary: Get booking details
      operationId: bookingDetails
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - member_id
                - tracking_id
                - booking_id
              properties:

                member_id:
                  type: string
                  description: Logged-in user member ID
                  example: "2"

                tracking_id:
                  type: string
                  description: eSIM or booking tracking ID
                  example: "11177260822126194QDWJV"

                booking_id:
                  type: string
                  description: Booking ID for the eSIM package
                  example: "ES2604MAYVA3A8"
              additionalProperties: true
            examples:
              default:
                value:
                  member_id: "2"
                  tracking_id: 11176276126126194RHSGI
                  booking_id: ES2510NOKJAAFK
      responses:
        '200':
          description: Booking info
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        
        



