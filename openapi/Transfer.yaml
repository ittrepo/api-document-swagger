ient service, driver information is subject to change. If you are unable to locate your driver using CheckPickup, contact your supplier for assistance. Do not leave without having contacted your supplier using the details below first.\n\nDISCLAIMER HolidayTaxis Group Limited (part of HBX Group) processes your personal data for the purpose of providing you with contracted travel services. For more information about how we process your personal data, please refer to the Privacy Policy.You have the right to access, rectify, delete, and restrict the processing of your data, as well as other rights recognized by applicable law. You can exercise these rights by contacting us at dataprotection@holidaytaxis.com"
