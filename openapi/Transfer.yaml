  /Transfeer/Create Booking:
    post:
      tags: [Transfer]
      summary: Search for Create Booking.
      operationId: CreatebookingSearch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - booking_tracking_id
                - transfer_tracking_id
                - member_id
                - payment_type
                - isd_code
                - contact_no
                - email_address
              properties:

                booking_tracking_id:
                  type: string
                  description: Booking tracking ID from validation
                  example: "11177303486226194YSHFB"

                transfer_tracking_id:
                  type: string
                  description: Transfer tracking ID with segment reference
                  example: "11177303486226194YSHFB||0-43"

                member_id:
                  type: string
                  description: Logged-in user member ID
                  example: "1"

                isPartialPay:
                  type: string
                  description: Indicates partial payment (yes / no)
                  example: "no"

                redirect_url:
                  type: string
                  description: Redirect URL after payment
                  example: "https://showkat.innovatedemo.com/inno-travel-tech/custom_modal.html"

                note:
                  type: string
                  description: Optional note for driver
                  example: "Note to driver"

                payment_type:
                  type: string
                  description: Payment method (account_balance / card / onlinepayment)
                  example: "account_balance"

                isd_code:
                  type: string
                  description: Country ISD code
                  example: "880"

                contact_no:
                  type: string
                  description: Contact number
                  example: "1966330000"

                email_address:
                  type: string
                  description: Customer email address
                  example: "iam@saaqeb.com"

                agency_email:
                  type: string
                  description: Agency email (optional)
                  example: "iam@saaqeb.com"

                connected_segment:
                  type: array
                  description: Linked travel segments (optional)
                  items:
                    type: object
                    properties:
                      segment_type:
                        type: string
                        description: Type of segment (FLIGHT / TRAIN / BUS)
                        example: "FLIGHT"
                      segment_point:
                        type: string
                        description: Segment point (ARRIVAL / DEPARTURE)
                        example: "ARRIVAL"
                      segment_code:
                        type: string
                        description: Travel segment code
                        example: "XA01-AB"
                      transfer_point:
                        type: string
                        description: Transfer point (START / END)
                        example: "START"
              additionalProperties: true
