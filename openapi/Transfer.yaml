openapi: 3.0.3
info:
  title: ITT Transfer API
  version: 1.0.0
  description: Transfer API endpoints converted from Postman collection.

servers:
  - url: "{protocol}://{fullUrl}"
    description: Dynamic Server Selection
    variables:
      protocol:
        enum:
          - https
          - http
        default: https
      fullUrl:
        default: serviceapi.b2b.innovatedemo.com
        description: Full URL of the server, e.g., serviceapi.b2b.innovatedemo.com or localhost:8080

tags:
  - name: Transfer
    description: Transfer search, pricing, booking, ancillaries and post-booking flows.

security:
  - apiKeyAuth: []
    secretCodeAuth: []
paths:
