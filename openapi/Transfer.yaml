openapi: 3.0.3
info:
  title: ITT Transfer API
  version: 1.0.0
  description: Transfer API endpoints converted from Postman collection.

servers:
  - url: "{protocol}://{fullUrl}"
    description: Dynamic Server Selection
    variables:
      protocol:
        enum:
          - https
          - http
        default: https
      fullUrl:
        default: serviceapi.b2b.innovatedemo.com
        description: Full URL of the server, e.g., serviceapi.b2b.innovatedemo.com or localhost:8080

tags:
  - name: Transfer
    description: Transfer search, pricing, booking, ancillaries and post-booking flows.

security:
  - apiKeyAuth: []
    secretCodeAuth: []
paths:
  /Transfer/Transfer Search:
    post:
      tags: [Transfer]
      summary: Search for transfers.
      operationId: TransferSearch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              
              required:
                - segment
                - journey_type
                - travelers_adult
                - guest_nationality
              properties:

                segment:
                  type: array
                  description: List of transfer route segments
                  items:
                    type: object
                    properties:
                      departure_type:
                        type: string
                        description: Type of departure location (AIRPORT / LOC / HOTEL)
                        example: AIRPORT

                      departure_code:
                        type: string
                        description: Departure location code or identifier
                        example: DXB

                      departure:
                        type: string
                        description: Full name of departure location
                        example: Dubai International Airport, Dubai

                      arrival_type:
                        type: string
                        description: Type of arrival location (AIRPORT / LOC / HOTEL)
                        example: LOC

                      arrival_code:
                        type: string
                        description: Arrival location code or identifier
                        example: Dubai Mall - Dubai - United Arab Emirates

                      arrival:
                        type: string
                        description: Full name of arrival location
                        example: Dubai Mall - Dubai - United Arab Emirates

                      outbound_date:
                        type: string
                        format: date-time
                        description: Transfer date and time (ISO format)
                        example: 2026-03-30T00:00:00
                      journey_type:
                        type: string
                        description: Type of journey (OneWay / RoundTrip)
                        enum:
                          - OneWay
                          - RoundTrip
                        example: OneWay

                      travelers_adult:
                        type: integer
                        description: Number of adult passengers
                        example: 2

                      travelers_adult_types:
                        type: array
                        description: Adult passenger type list
                        items:
                          type: string
                        example:
                          - ""

                      travelers_child:
                        type: integer
                        description: Number of child passengers
                        example: 0

                      travelers_child_types:
                        type: array
                        description: Child passenger types
                        items:
                          type: string
                        example: []

                      travelers_child_age:
                        type: array
                        description: Ages of child passengers
                        items:
                          type: integer
                        example: []

                      travelers_infants:
                        type: integer
                        description: Number of infant passengers
                        example: 0

                      travelers_infants_age:
                        type: array
                        description: Ages of infant passengers
                        items:
                          type: integer
                        example: []

                      travelers_infants_types:
                        type: array
                        description: Infant passenger types
                        items:
                          type: string
                        example: []

                      guest_nationality:
                        type: string
                        description: Guest nationality (ISO country code)
                        example: BD

                      transfer_type:
                        type: string
                        description: Type of transfer (private / shared)
                        example: private

                      supplier_uid:
                        type: string
                        description: Supplier identifier (all for any supplier)
                        example: all

                      partner_id:
                        type: string
                        description: Partner account ID (can be empty)
                        example: ""

                      short_ref:
                        type: string
                        description: Short reference for tracking (optional)
                        example: xxxx111

                      language:
                        type: string
                        description: Response language
                        example: en

                      service_type:
                        type: string
                        description: Service type (regular / premium)
                        enum:
                          - regular
                          - premium
                        example: regular
              additionalProperties: true
            examples:
              Transfer Search Request:
                value:
                  {
                    "segment":
                      [
                        {
                          "departure_type": "AIRPORT",
                          "departure_code": "DXB",
                          "departure": "Dubai International Airport, Dubai",
                          "arrival_type": "LOC",
                          "arrival_code": "Dubai Mall - Dubai - United Arab Emirates",
                          "arrival": "Dubai Mall - Dubai - United Arab Emirates",
                          "outbound_date": "2026-03-30T00:00:00",
                        },
                      ],
                    "journey_type": "OneWay",
                    "travelers_adult": 2,
                    "travelers_adult_types": [""],
                    "travelers_child": 0,
                    "travelers_child_types": [],
                    "travelers_child_age": [],
                    "travelers_infants": 0,
                    "travelers_infants_age": [],
                    "travelers_infants_types": [],
                    "guest_nationality": "BD",
                    "transfer_type": "private",
                    "supplier_uid": "all",
                    "partner_id": "",
                    "short_ref": "xxxx111",
                    "language": "en",
                    "service_type": "regular",
                  }
      responses:
        "200":
          description: Successfully Transfer Search Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              examples:
