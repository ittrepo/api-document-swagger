  /Transfer/Update Traveler Info:
    post:
      tags: [Transfer]
      summary: Update traveler information for existing transfers.
      operationId: UpdateTravelerInfo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - booking_tracking_id
                - member_id
                - passenger
              properties:

                booking_tracking_id:
                  type: string
                  description: Booking tracking ID from validation
                  example: "11177303486226194YSHFB"

                member_id:
                  type: string
                  description: Logged-in user member ID
                  example: "2"

                save_pax:
                  type: string
                  description: Save passenger information for future use (yes / no)
                  example: "yes"

                passenger:
                  type: array
                  description: List of passenger details
                  items:
                    type: object
                    required:
                      - pax_id
                      - pax_type
                      - first_name
                      - last_name
                    properties:

                      pax_id:
                        type: string
                        description: Unique passenger ID
                        example: "1"

                      pax_type:
                        type: string
                        description: Passenger type (ADT = Adult, CNN = Child, INF = Infant)
                        example: "ADT"

                      title:
                        type: string
                        description: Passenger title (MR / MRS / MS / MISS)
                        example: "MR"

                      first_name:
                        type: string
                        description: Passenger first name
                        example: "Jasim"

                      last_name:
                        type: string
                        description: Passenger last name
                        example: "Kalam"

