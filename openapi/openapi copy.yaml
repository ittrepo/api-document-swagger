  /esim/installation-instructions:
    post:
      tags: 
        - eSIM Booking
      summary: Get installation instructions
      operationId: installationInstructions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - member_id
                - tracking_id
                - eSim_iccid
              properties:

                member_id:
                  type: string
                  description: Logged-in user member ID
                  example: "1"

                tracking_id:
                  type: string
                  description: eSIM or booking tracking ID
                  example: "11177260822126194QDWJV"

                eSim_iccid:
                  type: string
                  description: ICCID of the eSIM
                  example: "8900000281278633887"

                preferred_language:
                  type: string
                  description: Preferred response language.
                  example: "en"
              additionalProperties: true
            examples:
              default:
                value:
                  member_id: "1"
                  tracking_id: 11176276126126194RHSGI
                  eSim_iccid: "873000000000040589"
                  preferred_language: en
      responses:
        '200':
          description: Instructions
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
