  /esim/update-customer:
    post:
      tags: 
      - eSIM Booking
      summary: Update customer information
      operationId: updateCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - booking_tracking_id
                - member_id
                - passenger
              properties:

                booking_tracking_id:
                  type: string
                  description: Booking tracking ID received from validation step
                  example: "11177260822126194QDWJV"

                member_id:
                  type: string
                  description: Logged-in user member ID
                  example: "2"

                save_pax:
                  type: string
                  description: Save passenger data for future bookings (yes / no)
                  example: "yes"

                passenger:
                  type: array
                  description: Passenger details
                  items:
                    type: object
                    required:
                      - pax_id
                      - pax_type
                      - first_name
                      - last_name
                    properties:

                      pax_id:
                        type: string
                        description: Passenger ID
                        example: "1"

                      pax_type:
                        type: string
                        description: Passenger type (ADT = Adult)
                        example: "ADT"

                      title:
                        type: string
                        description: Passenger title (MR / MRS / MS)
                        example: "MR"

                      first_name:
                        type: string
                        description: Passenger first name
                        example: "Jasim"

                      last_name:
                        type: string
                        description: Passenger last name
                        example: "Karimm"

                      age:
                        type: string
                        description: Passenger age
                        example: "30"

                      isd_code:
                        type: string
                        description: ISD code for contact number
                        example: "880"

                      contact_no:
                        type: string
                        description: Passenger contact number
                        example: "1966330000"

                      email_address:
                        type: string
                        format: email
                        description: Passenger email address
                        example: "test@mail.com"
              additionalProperties: true
            examples:
              default:
                value:
                  booking_tracking_id: 11176335754526194RQYGH
                  member_id: "2"
                  save_pax: yes
                  passenger:
                    - pax_id: "1"
                      pax_type: ADT
                      title: MR
                      first_name: Jasim
                      last_name: Karimm
                      age: "30"
                      isd_code: "880"
                      contact_no: 1966330000
                      email_address: test@mail.com
      responses:
        '200':
          description: Response for customer data update in a specific package booking.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              examples:
                successful_customer_update:
                  summary: Successful Update Customer Response
                  value:
                        {
                            "status": "success",
                            "reason": "Customer data has been successfully updated.",
                            "tracking_id": "11177260822126194QDWJV",
                            "total_guest": 1,
                            "data": [
                                {
                                    "tracking_id": "11177260822126194QDWJV",
                                    "pax_id": "1",
                                    "pax_type": "ADT",
                                    "gender": null,
                                    "title": "MR",
                                    "first_name": "JASIM",
                                    "last_name": "KARIMM",
                                    "pax_age": "30",
                                    "isd_code": "880",
                                    "contact_no": "1966330000",
                                    "email_address": "test@mail.com"
                                }
                            ]
                        }

                  no_package_data_found_error:
                     summary: Tracking ID Not Found Error
                     value:
                        status: "failed"
                        reason: "No package data found for this tracking_id!"
                  

              
                        
       
        
  /esim/create-booking:
    post:
      tags: 
      - eSIM Booking
      summary: Create eSIM booking
      operationId: createBooking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - booking_tracking_id
                - package_tracking_id
                - eSim_quantity
                - member_id
                - payment_type
              properties:

                booking_tracking_id:
                  type: string
                  description: Booking tracking ID from validation step
                  example: "11177260822126194QDWJV"

                package_tracking_id:
                  type: string
                  description: Unique package tracking identifier
                  example: "11177260822126194QDWJV||fatafati-in-7days-1gb"

                eSim_quantity:
                  type: string
                  description: Number of eSIM packages to purchase
                  example: "1"

                member_id:
                  type: string
                  description: Logged-in user member ID
                  example: "2"

                isPartialPay:
                  type: string
                  description: Whether partial payment is allowed (yes / no)
                  example: "no"

                redirect_url:
                  type: string
                  format: uri
                  description: Redirect URL after payment completion
                  example: "https://showkat.innovatedemo.com/inno-travel-tech/custom_modal.html"

                payment_type:
                  type: string
                  description: Payment method (account_balance / card / onlinepayment)
                  example: "account_balance"

                isd_code:
                  type: string
                  description: ISD code for contact number
                  example: "880"

                contact_no:
                  type: string
                  description: Contact number of the customer
                  example: "1966330000"

                email_address:
                  type: string
                  format: email
                  description: Customer email address
                  example: "iam@mail.com"

                agency_email:
                  type: string
                  format: email
                  description: Agency email address
                  example: "iam@mail.com"
              additionalProperties: true
            examples:
              default:
                value:
                  booking_tracking_id: 11176335754526194RQYGH
                  package_tracking_id: 11176335754526194RQYGH||fatafati-in-7days-1gb
                  eSim_quantity: "1"
                  member_id: "2"
                  isPartialPay: no
                  redirect_url: https://showkat.innovatedemo.com/inno-travel-tech/custom_modal.html
                  payment_type: account_balance
                  isd_code: "880"
                  contact_no: 1966330000
                  email_address: iam@mail.com
                  agency_email: iam@mail.com
      responses:
        '200':
          description: Booking created
          content:
