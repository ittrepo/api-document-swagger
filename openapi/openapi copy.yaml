openapi: 3.0.3
info:
  title: ITT E-Sim API
  version: 1.0.0
  description: E-Sim API endpoints converted from Postman collection.

servers:
  - url: "{protocol}://{fullUrl}"
    description: Dynamic Server Selection
    variables:
      protocol:
        enum:
          - https
          - http
        default: https
      fullUrl:
        default: serviceapi.b2b.innovatedemo.com
        description: Full URL of the server, e.g., serviceapi.b2b.innovatedemo.com or localhost:8080

tags:
  - name: E-Sim
    description: E-Sim search, pricing, booking, ancillaries and post-booking flows.

security:
  - apiKeyAuth: []
    secretCodeAuth: []
paths:
  /esim/search:
    post:
      tags: 
        - eSIM Search & Inquiry
      summary: Search eSIM plans
      operationId: esimSearch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - eSim
              properties:

                eSim:
                  type: object
                  required:
                    - region_type
                    - plan_type
                  properties:

                    region_type:
                      type: string
                      description: Region type for eSIM plan (local / global / europe / asia / all)
                      example: "local"

                    country_code:
                      type: string
                      description: Country ISO code (required only when region_type is local)
                      example: "BD"

                    plan_type:
                      type: string
                      description: Type of eSIM plan (e.g., data / voice / combo)
                      example: "data"

                    topup_included:
                      type: string
                      description: Whether top-up is included (yes / no)
                      example: "yes"

                supplier_uid:
                  type: string
                  description: Supplier identifier (use 'all' for all suppliers)
                  example: "all"

                partner_id:
                  type: string
                  description: Partner account ID
                  example: "1"

                short_ref:
                  type: string
                  description: Optional short reference ID for stream search
                  example: "xxxx111"

                language:
                  type: string
                  description: Response language
                  example: "en"
              additionalProperties: true
            examples:
              default:
                value:
                  {
                      "eSim": {
                          "region_type": "local", 
                          "country_code": "BD", 
                          "plan_type": "data",
                          "topup_included": "yes"
                      },
                      "supplier_uid": "all", 
                      "partner_id": "1", 
                      "short_ref": "xxxx111", 
                      "language": "en"
                  }
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
