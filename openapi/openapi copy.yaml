  /esim/data-usage:
    post:
      tags: 
        - eSIM Management
      summary: Get data usage
      operationId: dataUsage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - member_id
                - tracking_id
                - eSim_iccid
              properties:

                member_id:
                  type: string
                  description: Logged-in user member ID
                  example: "2"

                tracking_id:
                  type: string
                  description: Booking or eSIM tracking ID
                  example: "11177260822126194QDWJV"

                eSim_iccid:
                  type: string
                  description: eSIM ICCID (Integrated Circuit Card Identifier)
                  example: "8900000281278633887"
              additionalProperties: true
            examples:
              default:
                value:
                  member_id: "2"
                  tracking_id: 11176276126126194RHSGI
                  eSim_iccid: "873000000000040589"
      responses:
        '200':
          description: Usage details
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              examples:
                default:
                  value:
                    "status": "success"
                    "tracking_id": "11177260822126194QDWJV"
                    "booking_id": "ES2604MAYVA3A8"
                    "eSim_iccid": "8900000281278633887"
