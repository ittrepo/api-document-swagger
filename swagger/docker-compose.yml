version: '3.9'
services:
  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: travel-api-swagger
    environment:
      URLS: '[{"url":"/openapi/flight.yaml","name":"FlightAPI"},{"url":"/openapi/hotel.yaml","name":"HotelAPI"},{"url":"/openapi/transfer.yaml","name":"TransferAPI"},{"url":"/openapi/esim.yaml","name":"eSIMA_API"}]'
    ports:
      - "8080:8080"
    volumes:
      - ../openapi:/usr/share/nginx/html/openapi:ro
    restart: unless-stopped
